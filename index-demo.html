<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BOARDING AGENT TOOLS - Demo Registros</title>
  <link rel="stylesheet" href="registros.css">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; color: #111; }
    main { max-width: 1100px; margin: 0 auto; padding: 28px 16px; }
    .hero { background: #000; color: #fff; border-radius: 24px; padding: 28px; margin-bottom: 20px; }
    .hero h1 { margin: 0; }
    .exam-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin: 18px 0; }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>WELCOME BOARDING AGENT</h1>
      <p>BOARDING AGENT TOOLS</p>
    </section>

    <section id="examen">
      <h2>Módulo Examen</h2>
      <div class="exam-buttons">
        <button class="exam-btn">Examen diario</button>
        <button class="exam-btn">Simulador completo</button>
        <button class="exam-btn">Repasar errores</button>
        <button class="exam-btn">Mi progreso</button>
        <button id="btnRegistros" class="exam-btn">Registros</button>
      </div>
    </section>
  </main>

  <script src="registros.js"></script>
</body>
</html>
